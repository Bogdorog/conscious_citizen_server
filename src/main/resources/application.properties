spring.application.name=conscious_citizen_server
server.port=54455
spring.datasource.url=jdbc:postgresql://localhost:5432/citizen_db
spring.datasource.username=citizen
spring.datasource.password=professional
spring.datasource.driver-class-name=org.postgresql.Driver
# Disable Hibernate usage of JDBC metadata
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
# Specify explicitly the dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Database initialization should typically be performed outside of Spring lifecycle
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
security.jwt.tokenExpirationTime=3600
security.jwt.refreshTokenExpirationTime=2592000
security.jwt.secretkey = ovuU7ZvmYCddAEbSN6+oA/512g4R7K1nbbCd1N+3DUpKx6LVU77MaZBtuXtc0HvOgrHneQYvOwEK4WGGEtPERg==
logging.level.root=INFO
logging.level.com.sergeev.conscious_citizen_server=DEBUG
logging.level.org.springframework.security=DEBUG
management.endpoints.web.exposure.include=health, info, metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.info.build.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
# media
app.media.storage-root=media_storage
app.media.download-base=/api/media
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# resilience4j
resilience4j.retry.instances.fileStorageRetry.max-attempts=3
resilience4j.retry.instances.fileStorageRetry.wait-duration=500ms
resilience4j.retry.instances.fileStorageRetry.retry-exceptions=java.io.IOException
resilience4j.timelimiter.instances.fileStorageTimeLimiter.timeout-duration=3s
resilience4j.circuitbreaker.instances.fileStorageCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.fileStorageCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.fileStorageCircuitBreaker.record-exceptions=java.io.IOException
